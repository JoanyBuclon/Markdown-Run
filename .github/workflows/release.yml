name: Release

# Publish a GitHub Release with the packaged .vsix whenever a version tag is pushed.
# Tag the commit (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to trigger it.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        run: npm install -g pnpm@10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        # Non-blocking: surfaces advisories in the logs without failing the release.
        continue-on-error: true
        run: pnpm audit --audit-level=high

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Test
        # vscode-test launches a real VS Code instance, which needs a display on Linux.
        run: xvfb-run -a pnpm test

      - name: Package VSIX
        run: pnpm dlx @vscode/vsce package --no-dependencies

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" *.vsix --generate-notes
